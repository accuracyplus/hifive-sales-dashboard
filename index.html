<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HiFive Sales Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
  const HIFIVE_CONFIG = {
    CLIENT_ID: '829950296489-rdaoraktfujf4fkgkpn6ag79dsdml18j.apps.googleusercontent.com',
    API_URL:   'https://script.google.com/macros/s/AKfycbxZ-WJxZRjelokix-1XWp2WHJgMs-CIHx3n4tLrgMCdQDPksPUqq8keAYqRLfROSCKf5g/exec',
  };
</script>
  <style>
    body { font-family: 'DM Sans', sans-serif; }
    .google-btn-wrap { display: flex; justify-content: center; }
  </style>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center px-4">

  <div class="w-full max-w-sm bg-white rounded-2xl shadow-sm border border-gray-100 p-8">

    <!-- Logo -->
    <div class="flex justify-center mb-6">
      <div class="w-14 h-14 rounded-2xl border border-gray-100 shadow-sm flex items-center justify-center bg-white">
        <svg width="32" height="32" viewBox="0 0 28 28" fill="none">
          <rect x="3" y="3" width="10" height="10" rx="2" fill="#1D6B4F"/>
          <rect x="15" y="3" width="10" height="10" rx="2" fill="#2952A3"/>
          <rect x="3" y="15" width="10" height="10" rx="2" fill="#5DCAA5" opacity="0.7"/>
          <rect x="15" y="15" width="10" height="10" rx="2" fill="#5B8FE8" opacity="0.7"/>
        </svg>
      </div>
    </div>

    <!-- Title -->
    <div class="text-center mb-6">
      <h1 class="text-xl font-semibold text-gray-900">HiFive Sales Dashboard</h1>
      <p class="text-sm text-gray-400 mt-1">Sales & Business Development Monitoring</p>
    </div>

    <!-- Entity tags -->
    <div class="flex justify-center gap-2 mb-8">
      <span class="text-xs font-medium px-3 py-1 rounded-full border"
            style="background:#E8F5EE;color:#1D6B4F;border-color:#A0D4BB;">APML</span>
      <span class="text-xs font-medium px-3 py-1 rounded-full border"
            style="background:#E6EEFB;color:#2952A3;border-color:#A0BFED;">Atomic Drugstore</span>
    </div>

    <!-- Google Sign-In button -->
    <div id="sign-in-area" class="google-btn-wrap"></div>

    <!-- Messages -->
    <p id="loading-msg" class="hidden mt-4 text-sm text-gray-400 text-center">
      Verifying access...
    </p>
    <div id="error-box" class="hidden mt-4 rounded-lg p-3 text-sm text-center"
         style="background:#FCEBEB;color:#A32D2D;">
      <span id="error-msg"></span>
    </div>

    <!-- Footer -->
    <p class="text-xs text-gray-400 text-center mt-8 leading-relaxed">
      Access restricted to authorised staff only.<br/>
      Contact <a href="mailto:sinu.sureshan@hifiveholdings.com"
                 class="underline" style="color:#1D6B4F;">sinu.sureshan@hifiveholdings.com</a>
      for access issues.
    </p>
  </div>

  <script>
    function showError(msg) {
      document.getElementById('error-msg').textContent = msg;
      document.getElementById('error-box').classList.remove('hidden');
      document.getElementById('loading-msg').classList.add('hidden');
      document.getElementById('sign-in-area').classList.remove('hidden');
    }

    function handleCredentialResponse(response) {
      document.getElementById('sign-in-area').classList.add('hidden');
      document.getElementById('error-box').classList.add('hidden');
      document.getElementById('loading-msg').classList.remove('hidden');

      fetch(HIFIVE_CONFIG.API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({
          action:   'LOGIN',
          id_token: response.credential,
        }),
      })
      .then(function(res) { return res.json(); })
      .then(function(data) {
        if (!data.success) {
          showError(data.error || 'Access denied. Contact your administrator.');
          return;
        }
        sessionStorage.setItem('hifive_user',  JSON.stringify(data.user));
        sessionStorage.setItem('hifive_token', response.credential);
        window.location.href = 'dashboard.html';
      })
      .catch(function() {
        showError('Connection error. Please try again.');
      });
    }

    // Called automatically by GIS library when ready
    // (data-callback on the g_id_onload div below handles init)
    function renderGoogleButton() {
      if (sessionStorage.getItem('hifive_user')) {
        window.location.href = 'dashboard.html';
        return;
      }
      google.accounts.id.initialize({
        client_id:   HIFIVE_CONFIG.CLIENT_ID,
        callback:    handleCredentialResponse,
        auto_select: false,
      });
      google.accounts.id.renderButton(
        document.getElementById('sign-in-area'),
        { theme: 'outline', size: 'large', width: 280, text: 'signin_with' }
      );
    }
</script>

<!-- GIS library loaded last — calls renderGoogleButton when ready -->
<script src="https://accounts.google.com/gsi/client" onload="renderGoogleButton()"></script>
<!-- TEST MODE — activated by pressing Shift+T+M together -->
<div id="test-panel" style="display:none;position:fixed;bottom:20px;right:20px;background:#1A1916;border-radius:12px;padding:16px;width:240px;z-index:999;box-shadow:0 8px 24px rgba(0,0,0,0.3);">
  <p style="color:#5DCAA5;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px;">⚡ Test mode</p>
  <select id="test-role" style="width:100%;padding:7px 10px;border-radius:7px;border:1px solid #3A3A35;background:#2C2C28;color:#F5F4F0;font-size:12px;margin-bottom:8px;">
    <option value="admin|Both">Admin — Both entities</option>
    <option value="management|Both">Management — Both entities</option>
    <option value="bd_staff|APML">BD Staff — APML</option>
    <option value="bd_staff|Atomic">BD Staff — Atomic</option>
    <option value="ops_staff|APML">Ops Staff — APML</option>
    <option value="ops_staff|Atomic">Ops Staff — Atomic</option>
  </select>
  <button onclick="loginAsTestUser()" style="width:100%;padding:8px;border-radius:7px;border:none;background:#5DCAA5;color:#04342C;font-size:12px;font-weight:600;cursor:pointer;">Sign in as test user</button>
  <button onclick="document.getElementById('test-panel').style.display='none'" style="width:100%;padding:6px;border-radius:7px;border:none;background:transparent;color:#6B6860;font-size:11px;cursor:pointer;margin-top:4px;">Close</button>
</div>

<script>
  // Activate test panel with Shift+T then M within 1 second
  let shiftTPressed = false;
  document.addEventListener('keydown', function(e) {
    if (e.shiftKey && e.key === 'T') {
      shiftTPressed = true;
      setTimeout(function() { shiftTPressed = false; }, 1000);
    }
    if (shiftTPressed && e.key === 'M') {
      document.getElementById('test-panel').style.display =
        document.getElementById('test-panel').style.display === 'none' ? 'block' : 'none';
    }
  });

  function loginAsTestUser() {
    const val    = document.getElementById('test-role').value.split('|');
    const role   = val[0];
    const entity = val[1];

    const roleLabels = {
      admin:      'Administrator',
      management: 'General Manager',
      bd_staff:   'BD Executive',
      ops_staff:  'Ops Coordinator',
    };

    const testUser = {
      staff_id:       'ST-001',
      email:          'testmode@hifive.local',
      full_name:      '[TEST] ' + roleLabels[role],
      role:           role,
      entity:         entity,
      designation:    roleLabels[role] + ' (Test)',
      _test_mode:     true,
      _test_role:     role,
      _test_entity:   entity,
    };

    sessionStorage.setItem('hifive_user',  JSON.stringify(testUser));
    sessionStorage.setItem('hifive_token', 'TEST_MODE_TOKEN');
    window.location.href = 'dashboard.html';
  }
</script>
</body>
</html>
